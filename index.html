<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Audio Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo-mark">◈</span>
          <span class="logo-text">Library</span>
        </div>
        <nav id="folders" class="folder-list"></nav>
      </aside>

      <!-- Main content -->
      <main class="main">
        <header class="main-header">
          <h1 id="folderTitle" class="folder-title">Select a folder</h1>
          <span id="trackCount" class="track-count"></span>
        </header>
        <div id="tracks" class="track-list">
          <p class="empty-state">
            Choose a folder from the sidebar to browse tracks.
          </p>
        </div>
      </main>
    </div>

    <!-- Player bar -->
    <footer class="player" id="player">
      <div class="player-info">
        <div class="player-title" id="nowPlaying">Nothing playing</div>
        <div class="player-folder" id="nowFolder">—</div>
      </div>

      <div class="player-controls">
        <button
          class="ctrl-btn"
          id="btnPlay"
          onclick="togglePlay()"
          aria-label="Play / Pause"
        >
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg
            id="iconPause"
            viewBox="0 0 24 24"
            fill="currentColor"
            style="display: none"
          >
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
      </div>

      <div class="player-timeline">
        <span class="time-label" id="timeCurrent">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label" id="timeDuration">0:00</span>
      </div>

      <div id="errorBanner" class="error-banner" style="display: none"></div>

      <div class="player-volume">
        <svg viewBox="0 0 24 24" fill="currentColor" class="vol-icon">
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
          />
        </svg>
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.8"
        />
      </div>
    </footer>

    <audio id="audioPlayer" preload="auto"></audio>

    <script src="script.js"></script>
  </body>
</html>
